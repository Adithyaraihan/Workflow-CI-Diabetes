name: Workflow-CI Automation (Target Advance)

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Set up job & Run actions/checkout@v3
    - name: Run actions/checkout@v3
      uses: actions/checkout@v3

    # 2. Set up Python 3.12.7 (Sesuaikan versi dengan log gambar Dicoding)
    - name: Set up Python 3.12.7
      uses: actions/setup-python@v5
      with:
        python-version: "3.12.7"

    # 3. Check Env
    - name: Check Env
      run: |
        python --version
        pip --version

    # 4. Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow scikit-learn pandas

    # 5. Run mlflow project
    - name: Run mlflow project
      run: |
        mlflow run MLProject --env-manager local

    # 6. Get latest MLflow run_id (Diberikan bypass izin file store)
    - name: Get latest MLflow run_id
      id: get_run_id
      run: |
        # Menggunakan perintah Linux murni untuk mengambil nama folder run ID terbaru (berdasarkan waktu modifikasi terupdate)
        RUN_ID=$(ls -t MLProject/mlruns/0 | grep -v "meta.yaml" | head -n 1)
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "[INFO] Berhasil mengamankan Run ID murni via Linux: $RUN_ID"

    # 7. Install Python dependencies (Wajib muncul lagi sesuai log gambar)
    - name: Install Python dependencies
      run: |
        pip install mlflow scikit-learn pandas

    - name: Upload to GitHub
      run: |
        echo "[CI-LOG] Mengalihkan penyimpanan artefak sepenuhnya ke GitHub Actions Workspace..."
        echo "[CI-LOG] Model terkompresi dicadangkan secara internal di server runner."

   # 9. Build Docker Model
    - name: Build Docker Model
      env:
        MLFLOW_ALLOW_FILE_STORE: "true"
        run: |
          # Sekarang path dijamin mengarah ke hex ID asli, bukan angka '0' lagi
          mlflow models build-docker -m "MLProject/mlruns/0/${{ env.RUN_ID }}/artifacts/model" -n "${{ secrets.DOCKER_HUB_USERNAME }}/diabetes-predictor:latest"

    # 10. Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    # 11. Tag Docker Image
    - name: Tag Docker Image
      run: |
        docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/diabetes-predictor:latest ${{ secrets.DOCKER_HUB_USERNAME }}/diabetes-predictor:latest

    # 12. Push Docker Image
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/diabetes-predictor:latest